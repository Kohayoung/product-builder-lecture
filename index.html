<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="theme-toggle">
    <button id="themeBtn" onclick="toggleTheme()">🌙 다크 모드</button>
  </div>

  <h1>🎰 로또 번호 추천</h1>
  <p>버튼을 누르면 5게임이 한 번에 생성됩니다</p>

  <div class="option">
    <label>
      <input type="checkbox" id="bonusCheck"> 보너스 번호 포함
    </label>
  </div>

  <button class="main-btn" onclick="generateLotto()">번호 생성하기</button>

  <div id="results"></div>
</div>

<script src="main.js"></script>

</body>
</html>
