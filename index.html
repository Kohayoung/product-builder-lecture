<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="theme-toggle">
    <button id="themeBtn" onclick="toggleTheme()">🌙 다크 모드</button>
  </div>

  <h1>🎰 로또 번호 추천</h1>
  <p>버튼을 누르면 5게임이 한 번에 생성됩니다</p>

  <div class="option">
    <label>
      <input type="checkbox" id="bonusCheck"> 보너스 번호 포함
    </label>
  </div>

  <button class="main-btn" onclick="generateLotto()">번호 생성하기</button>

  <div id="results"></div>

  <div class="contact-section">
    <h3>🤝 제휴 문의</h3>
    <form action="https://formspree.io/f/xjglkdkp" method="POST">
      <div class="form-group">
        <input type="text" name="name" placeholder="성함 또는 업체명" required>
      </div>
      <div class="form-group">
        <input type="email" name="email" placeholder="이메일 주소" required>
      </div>
      <div class="form-group">
        <textarea name="message" placeholder="문의 내용을 입력해주세요" rows="4" required></textarea>
      </div>
      <button type="submit" class="submit-btn">문의하기</button>
    </form>
  </div>

  <div id="disqus_thread" class="comments-section"></div>
  <script>
      var disqus_config = function () {
          this.page.url = window.location.href;  
          this.page.identifier = window.location.pathname; 
      };
      (function() { 
          var d = document, s = d.createElement('script');
          s.src = 'https://product-builder-lecture.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
      })();
  </script>
  <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</div>

<script src="main.js"></script>

</body>
</html>
